<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150" role="img" aria-label="Trellis - the structure that helps every project grow">
  <defs>
    <linearGradient id="grow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0"   stop-color="#3f9e6f"/>
      <stop offset="0.5" stop-color="#5fb98a"/>
      <stop offset="1"   stop-color="#8fd6a3"/>
    </linearGradient>
    <linearGradient id="growH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#5fb98a"/>
      <stop offset="1"   stop-color="#8fd6a3"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161d27"/>
      <stop offset="1" stop-color="#0f141c"/>
    </linearGradient>
    <clipPath id="tileclip">
      <rect x="38" y="45" width="60" height="60" rx="12"/>
    </clipPath>
  </defs>

  <!-- panel -->
  <rect x="0.5" y="0.5" width="519" height="149" rx="18" fill="#0d1117" stroke="#1b2129"/>

  <!-- mark: a lattice (the structure) with a vine growing up it -->
  <g>
    <rect x="26" y="33" width="84" height="84" rx="20" fill="url(#tile)" stroke="#262e39"/>

    <!-- lattice -->
    <g clip-path="url(#tileclip)" stroke="#3d6f57" stroke-width="2" opacity="0.5">
      <path d="M-30 30 L60 120"/>
      <path d="M-16 30 L74 120"/>
      <path d="M-2 30 L88 120"/>
      <path d="M12 30 L102 120"/>
      <path d="M26 30 L116 120"/>
      <path d="M40 30 L130 120"/>
      <path d="M54 30 L144 120"/>
      <path d="M-30 120 L60 30"/>
      <path d="M-16 120 L74 30"/>
      <path d="M-2 120 L88 30"/>
      <path d="M12 120 L102 30"/>
      <path d="M26 120 L116 30"/>
      <path d="M40 120 L130 30"/>
      <path d="M54 120 L144 30"/>
    </g>

    <!-- vine growing up the lattice -->
    <path d="M68 104 C 59 92, 77 84, 68 72 C 60 63, 76 57, 68 49"
          fill="none" stroke="url(#grow)" stroke-width="4" stroke-linecap="round"/>
    <!-- leaves -->
    <path d="M68 87 C 79 85, 86 89, 86 96 C 78 96, 70 93, 68 87 Z" fill="url(#grow)"/>
    <path d="M68 66 C 57 64, 50 68, 50 75 C 58 75, 66 72, 68 66 Z" fill="url(#grow)" opacity="0.92"/>
    <!-- sprout tip -->
    <circle cx="68" cy="48" r="4.5" fill="#bdebd0"/>
  </g>

  <!-- wordmark -->
  <text x="130" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="650" letter-spacing="0.4" fill="#e6edf3">Trellis</text>
  <rect x="132" y="93" width="96" height="2.5" rx="1.25" fill="url(#growH)" opacity="0.85"/>
  <text x="133" y="116" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="500" letter-spacing="0.2" fill="#7d8896">the structure that helps every project grow</text>
</svg>
