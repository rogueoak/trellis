<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 150" width="520" height="150" role="img" aria-label="Spectra - spec-driven development with learning loops">
  <defs>
    <linearGradient id="coolspec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#5a82d6"/>
      <stop offset="0.5" stop-color="#7d72c8"/>
      <stop offset="1"   stop-color="#9a6fb0"/>
    </linearGradient>
    <linearGradient id="coolspecH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#5a82d6"/>
      <stop offset="0.5" stop-color="#7d72c8"/>
      <stop offset="1"   stop-color="#9a6fb0"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161d27"/>
      <stop offset="1" stop-color="#0f141c"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0.5" y="0.5" width="519" height="149" rx="18" fill="#0d1117" stroke="#1b2129"/>

  <!-- mark: a quiet monoline loop in a product tile -->
  <g>
    <rect x="26" y="33" width="84" height="84" rx="20" fill="url(#tile)" stroke="#262e39"/>
    <!-- open loop (the learning cycle) -->
    <path d="M68 51 a24 24 0 1 1 -17 7" fill="none" stroke="url(#coolspec)" stroke-width="4" stroke-linecap="round"/>
    <!-- node on the loop -->
    <circle cx="68" cy="51" r="5" fill="#cdd6e0"/>
  </g>

  <!-- wordmark -->
  <text x="130" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="650" letter-spacing="0.4" fill="#e6edf3">Spectra</text>
  <rect x="132" y="93" width="112" height="2.5" rx="1.25" fill="url(#coolspecH)" opacity="0.85"/>
  <text x="133" y="116" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13.5" font-weight="500" letter-spacing="0.2" fill="#7d8896">spec-driven development · learning loops</text>
</svg>
