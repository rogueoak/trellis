name: Update What's new

# When a GitHub Release is published, refresh the "What's new" block in the README
# with the release tag and the first line of its notes, then commit the change back.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Rewrite the What's new block
        env:
          TAG: ${{ github.event.release.tag_name }}
          NAME: ${{ github.event.release.name }}
          BODY: ${{ github.event.release.body }}
        run: |
          python3 - <<'PY'
          import os, re

          tag = os.environ["TAG"].strip()
          name = os.environ.get("NAME", "").strip()
          body = os.environ.get("BODY", "")

          # Headline = first non-empty, non-heading line of the release notes.
          # Fall back to the release title, then to a generic line.
          headline = ""
          for line in body.splitlines():
              line = line.strip()
              if line and not line.startswith("#"):
                  headline = line
                  break
          if not headline:
              headline = name or "New release available."

          block = f"<!-- whats-new -->\n**{tag}** - {headline}\n<!-- /whats-new -->"

          with open("README.md", encoding="utf-8") as f:
              readme = f.read()

          new_readme, count = re.subn(
              r"<!-- whats-new -->.*?<!-- /whats-new -->",
              lambda _: block,
              readme,
              flags=re.S,
          )
          if count == 0:
              raise SystemExit("No <!-- whats-new --> markers found in README.md")

          with open("README.md", "w", encoding="utf-8") as f:
              f.write(new_readme)
          PY

      - name: Commit if changed
        run: |
          if git diff --quiet -- README.md; then
            echo "What's new already current; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update What's new for ${{ github.event.release.tag_name }}"
          git push
