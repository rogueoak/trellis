name: Update What's new

# Refreshes the README "What's new" headline after a release. Shipped by Trellis's
# plugin-release template and OWNED by Trellis (refreshed by trellis-update) - do NOT edit.
#
# It triggers on the Release workflow COMPLETING, not on `release: [published]`. This matters: a
# Release created by the workflow's GITHUB_TOKEN does not fire `release:` events (GitHub
# suppresses that to prevent recursion), so a release-triggered job would never run after an
# automated release. workflow_run fires regardless of how the release was made.
#
# It then lands the change through an auto-created, self-squash-merged PR (not a direct push), so
# it works on a ruleset-protected main. Needs the org setting "Allow GitHub Actions to create and
# approve pull requests".
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

# Least privilege: push the branch (contents) and open + merge the PR (pull-requests).
permissions:
  contents: read

# Serialize so two near-simultaneous releases can't open competing PRs.
concurrency:
  group: whats-new
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_TOKEN: ${{ github.token }}
      BASE: ${{ github.event.repository.default_branch }}
    steps:
      - name: Check out the default branch
        # Pinned to a full SHA (v4.2.2) - this job holds write tokens and self-merges to main.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Refresh the What's new block from the latest release and land via PR
        run: |
          v="$(cat VERSION)"
          # The Release workflow may have no-op'd (version unchanged) - then there is nothing new.
          if ! gh release view "$v" >/dev/null 2>&1; then
            echo "No release for $v yet; nothing to refresh."
            exit 0
          fi
          TAG="$v" \
          NAME="$(gh release view "$v" --json name -q .name)" \
          BODY="$(gh release view "$v" --json body -q .body)" \
          scripts/whats-new.sh --write
          if git diff --quiet -- README.md; then
            echo "What's new already current; nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/whats-new-${v}"
          git switch -c "$BRANCH"
          git add README.md
          git commit -m "docs: refresh What's new for ${v}"
          # Plain --force: a disposable per-tag bot branch; the concurrency group serializes writers.
          git push --force origin "$BRANCH"
          # Reuse an existing PR on a re-run instead of dying on "already exists" under `set -e`.
          gh pr create --base "$BASE" --head "$BRANCH" \
            --title "docs: refresh What's new for ${v}" \
            --body "Automated by the What's new workflow from the ${v} release notes." \
            || echo "PR already open for ${BRANCH}; proceeding to merge."
          # No required checks on the ruleset, so the PR is mergeable at once; retry briefly in
          # case GitHub has not finished computing mergeability.
          for i in 1 2 3 4 5; do
            gh pr merge "$BRANCH" --squash --delete-branch && exit 0
            echo "merge not ready (attempt $i); retrying..."
            sleep 5
          done
          echo "::error::Could not squash-merge the What's new PR for ${v}"
          exit 1
